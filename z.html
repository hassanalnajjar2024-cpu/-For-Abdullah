<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تهنئة زواج</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* شاشة كلمة السر */
#login {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000000cc;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input {
    padding: 10px;
    margin-top: 10px;
    width: 200px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #ff4d6d;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
}

/* المحتوى */
#content {
    display: none;
    padding-top: 80px;
}

h1 {
    font-size: 45px;
}

.heart {
    font-size: 60px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>
<body>
<!-- شاشة كلمة السر -->
<div id="login">
    <div class="box">
        <h2>🔒 أدخل كلمة السر</h2>
        <input type="password" id="password" placeholder="كلمة السر">
        <br>
        <button onclick="checkPassword()">دخول</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>
<!-- الصفحة الرئيسية -->
<div id="content">
    <h1>💍 ألف مبروك الزواج 💍</h1>
    <h2>عبد الله ❤️ فاطمة</h2>
    <p>نتمنى لكم حياة مليئة بالسعادة والحب 💖</p>
    <div class="heart">❤️</div>
</div>
<script>
// كلمة السر
function checkPassword() {
    var pass = document.getElementById("password").value;

    if(pass === "2022") {
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        startConfetti();
    } else {
        document.getElementById("error").innerText = "كلمة السر غير صحيحة!";
    }
}

// Confetti
function startConfetti() {
    for (let i = 0; i < 100; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.animationDuration = (Math.random() * 3 + 2) + "s";
        conf.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
        document.body.appendChild(conf);
    }
}
</script>
</body>
</html>
